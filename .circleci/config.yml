version: 2.1
orbs:
  webapp: policyme/webappn20@dev:master
  utils: policyme/utils_v3@dev:master
  sonarqube: policyme/sonarqube_v5@dev:master
  itt: policyme/itt_v8@dev:master
  continuation: circleci/continuation@1.0.0

parameters:
  run-itt:
    default: false
    type: boolean
  run-itt-all-test-cases:
    default: false
    type: boolean
  run-itt-selected-test-cases:
    default: false
    type: boolean
  run-itt-test-case-number:
    default: -1
    type: integer
  run-itt-docusign:
    default: false
    type: boolean
  run-itt-for-tenant:
    default: ""
    type: string
  run-itt-ondemand:
    default: true
    type: boolean
  run-policyme:
    default: true
    type: boolean
  is_nightly_run:
    default: false
    type: boolean
  run-itt-nightly:
    default: false
    type: boolean
  skip-itt-precheck:
    default: false
    type: boolean
  slack-initiator:
    default: ""
    type: string
  run-journey-tests:
    default: false
    type: boolean

# This allows you to use CircleCI's dynamic configuration feature
# https://circleci.com/docs/dynamic-config/
setup: true

workflows:
  itt_docusign:
    when: << pipeline.parameters.run-itt-docusign >>
    jobs:
      - itt/cypress:
          name: 1-test-case
          test_case_number: 1
          use_ondemand: << pipeline.parameters.run-itt-ondemand >>
          context:
            - PM_AWS_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_PYPI_CONTEXT
            - PM_GOOGLE_CONTEXT
            - PM_NPM_READ_CONTEXT
      - itt/cypress:
          name: 2-test-case
          test_case_number: 2
          use_ondemand: << pipeline.parameters.run-itt-ondemand >>
          context:
            - PM_AWS_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_GOOGLE_CONTEXT
            - PM_NPM_READ_CONTEXT
      - itt/cypress:
          name: 3-test-case
          test_case_number: 3
          use_ondemand: << pipeline.parameters.run-itt-ondemand >>
          context:
            - PM_AWS_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_PYPI_CONTEXT
            - PM_GOOGLE_CONTEXT
            - PM_NPM_READ_CONTEXT
      - itt/send-slack-message:
          use_ondemand: << pipeline.parameters.run-itt-ondemand >>
          is_nightly_run: << pipeline.parameters.is_nightly_run >>
          requires:
            - 1-test-case
            - 2-test-case
            - 3-test-case
          context:
            - PM_AWS_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_SLACK_CONTEXT
            - PM_GOOGLE_CONTEXT

  itt-single-testcase:
    when:
      and:
        - << pipeline.parameters.run-itt >>
        - not: << pipeline.parameters.run-itt-all-test-cases >>
        - not: << pipeline.parameters.run-itt-selected-test-cases >>
        # https://discuss.circleci.com/t/unable-to-force-pipeline-number-to-be-type-string/40201
        - matches:
            pattern: "^(2|4|[6-9]|1[0-9]|2[0-1]|2[3-6]|29]|3[0-6])( )$"
            value: "<< pipeline.parameters.run-itt-test-case-number >> "
    jobs:
      - itt/db_dump:
          use_ondemand: << pipeline.parameters.run-itt-ondemand >>
          context:
            - PM_AWS_CONTEXT
            - PM_GITHUB_CONTEXT
      - itt/cypress:
          name: << pipeline.parameters.run-itt-test-case-number >>-test-case
          test_case_number: << pipeline.parameters.run-itt-test-case-number >>
          run_itt_for_tenant: << pipeline.parameters.run-itt-for-tenant >>
          requires:
            - itt/db_dump
          use_ondemand: << pipeline.parameters.run-itt-ondemand >>
          context:
            - PM_AWS_CONTEXT
            - PM_PYPI_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_GOOGLE_CONTEXT
            - PM_NPM_READ_CONTEXT
      - itt/waiter:
          name: wait-for-test-cases
          waiter_job_name: "wait-for-test-cases"
          context:
            - PM_CIRCLECI_CONTEXT
      - itt/send-slack-message:
          use_ondemand: << pipeline.parameters.run-itt-ondemand >>
          is_nightly_run: << pipeline.parameters.is_nightly_run >>
          requires:
            - wait-for-test-cases
          context:
            - PM_AWS_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_SLACK_CONTEXT
            - PM_GOOGLE_CONTEXT

  itt-single-testcase-with-validation:
    when:
      and:
        - << pipeline.parameters.run-itt >>
        - not: << pipeline.parameters.run-itt-all-test-cases >>
        - not: << pipeline.parameters.run-itt-selected-test-cases >>
        # https://discuss.circleci.com/t/unable-to-force-pipeline-number-to-be-type-string/40201
        - matches:
            pattern: "^(1|3|5|22|2[7-8]|3[7-8]|4[2-4]|50|5[2-4])( )$"
            value: "<< pipeline.parameters.run-itt-test-case-number >> "
    jobs:
      - continuation/continue:
          name: prepare-for-itt
          configuration_path: .circleci/itt_single_testcase_with_validation/test_case_<< pipeline.parameters.run-itt-test-case-number >>.yml

  itt-all-testcases:
    when:
      and:
        - << pipeline.parameters.run-itt >>
        - << pipeline.parameters.run-itt-all-test-cases >>
    jobs:
      - continuation/continue:
          name: prepare-for-itt
          configuration_path: .circleci/itt_all_testcases_config.yml

  itt:
    when:
      and:
        - << pipeline.parameters.run-itt >>
        - << pipeline.parameters.run-itt-selected-test-cases >>
    jobs:
      - continuation/continue:
          name: prepare-for-itt
          configuration_path: .circleci/itt_config.yml

  itt-nightly:
    when: << pipeline.parameters.run-itt-nightly >>
    jobs:
      - continuation/continue:
          name: prepare-for-itt-nightly
          configuration_path: .circleci/itt_nightly_config.yml

  journey-tests:
    when: << pipeline.parameters.run-journey-tests >>
    jobs:
      - continuation/continue:
          name: prepare-for-journey-tests
          configuration_path: .circleci/journey_tests_config.yml

  policyme:
    when: << pipeline.parameters.run-policyme >>
    jobs:
      # ===== VALIDATION JOBS =====
      - webapp/eb-check-pull:
          post-steps:
            - webapp/post_eb_check_pull_send_slack_message
          context:
            - PM_GITHUB_CONTEXT
            - PM_PYPI_CONTEXT
            - PM_SLACK_CONTEXT
            - PM_JIRA_CONTEXT
          filters:
            branches:
              ignore:
                - /release\/.*/
      - webapp/ratchet:
          context:
            - PM_PYPI_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_SLACK_CONTEXT
            - PM_NPM_READ_CONTEXT
            - PM_PERCY_CONTEXT
            - PM_AWS_CONTEXT
            - PM_RATCHET_CONTEXT
          filters:
            branches:
              ignore:
                - /release\/.*/
      - utils/create-pr-label:
          context:
            - PM_GITHUB_CONTEXT
            - PM_RELEASE_CONTEXT
            - PM_PYPI_CONTEXT
          filters:
            branches:
              ignore:
                - /release\/.*/
      - utils/add_reviewers:
          context:
            - PM_GITHUB_CONTEXT
            - PM_PYPI_CONTEXT
          filters:
            branches:
              ignore:
                - /release\/.*/
      - utils/check_licenses:
          files_to_check: "['package.json']"
          cache_keys: "webapp-npm-{{ .Environment.CIRCLE_PROJECT_REPONAME }}-{{ .Branch }}-{{ checksum \"package.json\" }}"
          needs_venv: false
          context:
            - PM_AWS_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_PYPI_CONTEXT
          filters:
            branches:
              only:
                - /pull\/.*/
      - sonarqube/scan_base_branch:
          pre-steps:
            - attach_workspace:
                at: /tmp/workspace
          additional_scanner_params: |
            -Dsonar.coverage.exclusions=**/* \
            -Dsonar.javascript.lcov.reportPaths=
          context:
            - PM_SONAR_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_AWS_CONTEXT
          filters:
            branches:
              only:
                - /pull\/.*/
      - sonarqube/scan_pr:
          additional_scanner_params: |
            -Dsonar.coverage.exclusions=**/* \
            -Dsonar.javascript.lcov.reportPaths=
          requires:
            - sonarqube/scan_base_branch
          context:
            - PM_SONAR_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_AWS_CONTEXT
          filters:
            branches:
              only:
                - /pull\/.*/
      - sonarqube/quality_gate_pr:
          requires:
            - sonarqube/scan_pr
          context:
            - PM_SONAR_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_AWS_CONTEXT
          filters:
            branches:
              only:
                - /pull\/.*/
      # ===== DEPLOY FOR RELEASE BRANCHES =====
      - webapp/deploy:
          name: webapp/deploy-release
          post-steps:
            - webapp/post_deploy_send_slack_message
          context:
            - PM_GITHUB_CONTEXT
            - PM_AUTHO_CONTEXT
            - PM_AWS_CONTEXT
            - PM_SLACK_CONTEXT
            - PM_PYPI_CONTEXT
            - PM_JIRA_CONTEXT
            - PM_NPM_READ_CONTEXT
            - PM_SENTRY_DEPLOY_CONTEXT
          filters:
            branches:
              only:
                - /release\/.*/
      # ===== TESTS FOR DEVELOP/MASTER/PRs =====
      - webapp/jest:
          name: webapp/jest
          post-steps:
            - webapp/post_jest_send_slack_message
            - store_artifacts:
                path: ./coverage
          context:
            - PM_PYPI_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_JIRA_CONTEXT
            - PM_SLACK_CONTEXT
            - PM_NPM_READ_CONTEXT
            - PM_PERCY_CONTEXT
            - PM_AWS_CONTEXT
          requires:
            - webapp/eb-check-pull
          filters:
            branches:
              ignore:
                - /release\/.*/
      - webapp/lokalise:
          name: webapp/lokalise
          post-steps:
            - webapp/post_jest_send_slack_message
            - store_artifacts:
                path: ./coverage
          context:
            - PM_PYPI_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_JIRA_CONTEXT
            - PM_SLACK_CONTEXT
            - PM_NPM_READ_CONTEXT
            - PM_PERCY_CONTEXT
            - PM_AWS_CONTEXT
          requires:
            - webapp/eb-check-pull
          filters:
            branches:
              ignore:
                - /release\/.*/
      - webapp/percy:
          name: webapp/percy
          post-steps:
            - webapp/post_jest_send_slack_message
            - store_artifacts:
                path: ./coverage
          context:
            - PM_PYPI_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_JIRA_CONTEXT
            - PM_SLACK_CONTEXT
            - PM_NPM_READ_CONTEXT
            - PM_PERCY_CONTEXT
            - PM_AWS_CONTEXT
          requires:
            - webapp/eb-check-pull
          filters:
            branches:
              ignore:
                - /release\/.*/
      - webapp/cypress-component-custom-parameter:
          name: "cypress-component-tests-bucket1"
          cypress_component_test_name: "cypress-component-tests-bucket1"
          post-steps:
            - webapp/post_cypress_send_slack_message
            - store_artifacts:
                path: ./coverage
          context:
            - PM_AWS_CONTEXT
            - PM_PYPI_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_JIRA_CONTEXT
            - PM_SLACK_CONTEXT
            - PM_NPM_READ_CONTEXT
          requires:
            - webapp/eb-check-pull
          filters:
            branches:
              only:
                - master
                - develop
                - /pull\/.*/
      - webapp/cypress-component-custom-parameter:
          name: "cypress-component-tests-bucket2"
          cypress_component_test_name: "cypress-component-tests-bucket2"
          post-steps:
            - webapp/post_cypress_send_slack_message
            - store_artifacts:
                path: ./coverage
          context:
            - PM_AWS_CONTEXT
            - PM_PYPI_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_JIRA_CONTEXT
            - PM_SLACK_CONTEXT
            - PM_NPM_READ_CONTEXT
          requires:
            - webapp/eb-check-pull
          filters:
            branches:
              only:
                - master
                - develop
                - /pull\/.*/
      - webapp/cypress-a11y-custom-parameter:
          name: "cypress-a11y-tests-bucket1"
          cypress_a11y_test_name: "cypress-a11y-tests-bucket1"
          post-steps:
            - webapp/post_cypress_send_slack_message
            - store_artifacts:
                path: ./coverage
          context:
            - PM_AWS_CONTEXT
            - PM_PYPI_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_JIRA_CONTEXT
            - PM_SLACK_CONTEXT
            - PM_NPM_READ_CONTEXT
          requires:
            - webapp/eb-check-pull
          filters:
            branches:
              only:
                - master
                - develop
                - /pull\/.*/
      - webapp/cypress-a11y-custom-parameter:
          name: "cypress-a11y-tests-bucket2"
          cypress_a11y_test_name: "cypress-a11y-tests-bucket2"
          post-steps:
            - webapp/post_cypress_send_slack_message
            - store_artifacts:
                path: ./coverage
          context:
            - PM_AWS_CONTEXT
            - PM_PYPI_CONTEXT
            - PM_GITHUB_CONTEXT
            - PM_JIRA_CONTEXT
            - PM_SLACK_CONTEXT
            - PM_NPM_READ_CONTEXT
          requires:
            - webapp/eb-check-pull
          filters:
            branches:
              only:
                - master
                - develop
                - /pull\/.*/
      - webapp/deploy:
          name: webapp/deploy
          post-steps:
            - webapp/post_deploy_send_slack_message
          context:
            - PM_GITHUB_CONTEXT
            - PM_AUTHO_CONTEXT
            - PM_AWS_CONTEXT
            - PM_SLACK_CONTEXT
            - PM_PYPI_CONTEXT
            - PM_JIRA_CONTEXT
            - PM_NPM_READ_CONTEXT
            - PM_SENTRY_DEPLOY_CONTEXT
          requires:
            - webapp/jest
            - webapp/lokalise
            - webapp/percy
            - cypress-component-tests-bucket2
            - cypress-component-tests-bucket1
            - cypress-a11y-tests-bucket2
            - cypress-a11y-tests-bucket1
          filters:
            branches:
              only:
                - master
                - develop
                - /pull\/.*/
      # ===== POST-DEPLOY JOBS =====
      - utils/generate-knowledge-base:
          context:
            - PM_GITHUB_CONTEXT
          requires:
            - webapp/deploy
          filters:
            branches:
              only:
                - develop
      - utils/jira:
          name: utils/jira-release
          context:
            - PM_PYPI_CONTEXT
            - PM_JIRA_CONTEXT
            - PM_GITHUB_CONTEXT
          requires:
            - webapp/deploy-release
          filters:
            branches:
              only:
                - /release\/.*/
      - utils/jira:
          name: utils/jira
          context:
            - PM_PYPI_CONTEXT
            - PM_JIRA_CONTEXT
            - PM_GITHUB_CONTEXT
          requires:
            - webapp/deploy
          filters:
            branches:
              only:
                - master
                - develop
